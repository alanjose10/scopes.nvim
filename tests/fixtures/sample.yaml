version: "3.8"

services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
      PORT: "8080"
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: admin

networks:
  default:
    driver: bridge

volumes:
  db_data:
    driver: local
